<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Templates — Mac Guttenberg</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+PHJlY3Qgd2lkdGg9IjMyIiBoZWlnaHQ9IjMyIiBmaWxsPSIjMUMxQTE2Ii8+PHRleHQgeD0iNTAlIiB5PSI3MiUiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZvbnQtc2l6ZT0iMTgiIGZvbnQtZmFtaWx5PSJHZW9yZ2lhLHNlcmlmIiBmaWxsPSIjRThFNERDIiBmb250LXdlaWdodD0iYm9sZCI+bWc8L3RleHQ+PC9zdmc+">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#E8E4DC;--bg2:#DDD9D0;--white:#FAFAF7;--card:#F5F2EC;
  --border:#D0CAC0;--text:#1C1A16;--text-mid:#48443C;--text-muted:#7A7468;
  --accent:#7fa0c3;--accent2:#3D6B9A;--dark:#1C1A16;--dark2:#2A2720;
}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}

nav{position:sticky;top:0;z-index:50;height:56px;padding:0 2rem;display:flex;align-items:center;justify-content:space-between;background:var(--dark);border-bottom:1px solid rgba(255,255,255,.06);}
.nav-logo{display:flex;align-items:center;gap:.75rem;color:#fff;text-decoration:none;font-family:"Fraunces",serif;font-weight:900;font-size:1.05rem;}
.nav-logo span{font-size:.68rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.4);font-family:"DM Sans",sans-serif;border-left:1px solid rgba(255,255,255,.15);padding-left:.75rem;}
.nav-back{font-size:.72rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.4);text-decoration:none;}
.nav-back:hover{color:#fff;}

.wrap{max-width:1200px;margin:0 auto;padding:3rem 2rem 5rem;}
.eyebrow{font-size:.68rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:.85rem;display:flex;align-items:center;gap:.5rem;}
.eyebrow::before{content:"";width:14px;height:1.5px;background:var(--accent);}
h1{font-family:"Fraunces",serif;font-size:clamp(2rem,3.4vw,3rem);font-weight:900;line-height:1;letter-spacing:-.03em;margin-bottom:.6rem;}
h1 em{font-style:italic;color:var(--accent);font-weight:700;}
.sub{font-size:.95rem;color:var(--text-muted);font-weight:300;margin-bottom:2.5rem;max-width:560px;line-height:1.5;}

.controls{display:grid;grid-template-columns:1fr 1fr;gap:1rem;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.5rem;margin-bottom:2rem;}
.ctrl{display:flex;flex-direction:column;gap:.4rem;}
.ctrl label{font-size:.7rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);}
.ctrl select,.ctrl input{font-family:"DM Sans",sans-serif;font-size:.92rem;color:var(--text);background:var(--white);border:1px solid var(--border);border-radius:8px;padding:.7rem .85rem;outline:none;width:100%;transition:border-color .15s,box-shadow .15s;}
.ctrl select:focus,.ctrl input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(127,160,195,.15);}

.preview-wrap{background:var(--white);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.preview-head{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem;border-bottom:1px solid var(--border);background:var(--card);}
.preview-title{font-family:"Fraunces",serif;font-size:1.1rem;font-weight:700;}
.preview-tag{font-size:.68rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);}
.preview-body{padding:1.5rem 1.75rem;}
.preview-subject{font-size:.7rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.4rem;}
.preview-subject-val{font-size:1rem;font-weight:600;color:var(--text);margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px dashed var(--border);}
.preview-msg{white-space:pre-wrap;font-size:.95rem;line-height:1.65;color:var(--text);font-family:"DM Sans",sans-serif;min-height:200px;}
.preview-msg .var-empty{background:rgba(200,100,100,.15);color:#8a3030;padding:1px 6px;border-radius:3px;font-weight:500;}
.preview-actions{display:flex;gap:.6rem;padding:1.25rem 1.5rem;border-top:1px solid var(--border);background:var(--card);flex-wrap:wrap;}
.btn{font-family:"DM Sans",sans-serif;font-size:.85rem;font-weight:500;padding:.7rem 1.3rem;border-radius:6px;border:none;cursor:pointer;transition:background .15s,color .15s;display:inline-flex;align-items:center;gap:.4rem;}
.btn-primary{background:var(--dark);color:#fff;}
.btn-primary:hover{background:var(--dark2);}
.btn-secondary{background:transparent;color:var(--text-mid);border:1px solid var(--border);}
.btn-secondary:hover{background:var(--white);color:var(--text);}
.btn-mark{background:var(--accent);color:#fff;margin-left:auto;}
.btn-mark:hover{background:var(--accent2);}

.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--dark);color:#fff;padding:.8rem 1.4rem;border-radius:8px;font-size:.85rem;opacity:0;transition:opacity .2s,transform .2s;z-index:200;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.error{background:#8a3030;}

@media(max-width:700px){
  .controls{grid-template-columns:1fr;}
  .wrap,nav{padding-left:1rem;padding-right:1rem;}
  .btn-mark{margin-left:0;}
}
</style>
</head>
<body>

<nav>
  <a href="/dashboard" class="nav-logo">mg<span>Email Templates</span></a>
  <a href="/dashboard" class="nav-back">← Dashboard</a>
</nav>

<div class="wrap">
  <div class="eyebrow">Outreach Library</div>
  <h1>Pick a lead, pick a <em>template,</em> send.</h1>
  <p class="sub">Templates auto-fill with lead info. Hitting "Mark contacted" updates Last Contact in your tracker too.</p>

  <div class="controls">
    <div class="ctrl">
      <label for="lead">Lead</label>
      <select id="lead"><option value="">Loading leads…</option></select>
    </div>
    <div class="ctrl">
      <label for="template">Template</label>
      <select id="template"></select>
    </div>
  </div>

  <div class="preview-wrap">
    <div class="preview-head">
      <div class="preview-title" id="t-name">—</div>
      <div class="preview-tag" id="t-channel">—</div>
    </div>
    <div class="preview-body">
      <div class="preview-subject">Subject</div>
      <div class="preview-subject-val" id="t-subject" contenteditable="true">—</div>
      <div class="preview-msg" id="t-body" contenteditable="true">—</div>
    </div>
    <div class="preview-actions">
      <button class="btn btn-primary" onclick="copyMsg()">📋 Copy message</button>
      <button class="btn btn-secondary" onclick="openEmail()">✉️ Open in email</button>
      <button class="btn btn-mark" onclick="markContacted()" id="markBtn">Mark contacted (today) →</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const TEMPLATES = [
  {
    id: 'cold-ig',
    name: 'Cold outreach (Instagram DM)',
    channel: 'Instagram DM',
    subject: '(no subject — DM)',
    body: `Hey {firstName} — your work at {biz} is genuinely beautiful. {customAngle}

I help small Etsy/service businesses build the systems that match their growth — custom order intake, getting Instagram actually working, that kind of thing.

Would you be open to a free 30-min audit? No pitch, just a clear picture of what's possible. Calendly: calendly.com/macguttenberg/30min`
  },
  {
    id: 'cold-email',
    name: 'Cold outreach (Email)',
    channel: 'Email',
    subject: 'Quick idea for {biz}',
    body: `Hi {firstName},

I came across {biz} and was really impressed by what you've built. {customAngle}

I work with small service-based businesses to build the digital systems that match their growth — client portals, automation, custom order intake, that kind of thing. Most of my clients are doing real revenue but their operations are the bottleneck.

Would you be open to a free 30-minute audit? I'll come back with a clear picture of what's possible — no pressure, no pitch.

Calendly: calendly.com/macguttenberg/30min

Best,
Mac`
  },
  {
    id: 'followup-1',
    name: 'Follow-up #1 (3-4 days after first message)',
    channel: 'Email or DM',
    subject: 'Following up — {biz}',
    body: `Hey {firstName},

Just floating this back up in case it got buried. Totally fine if now's not the right time — wanted to make sure you saw it.

The free audit offer still stands: calendly.com/macguttenberg/30min

— Mac`
  },
  {
    id: 'followup-2',
    name: 'Follow-up #2 (final nudge, 1 week later)',
    channel: 'Email or DM',
    subject: 'Last note from me — {biz}',
    body: `Hi {firstName},

Last note from me, promise. I'll stop pestering after this.

If a 30-min audit isn't useful right now, no worries at all. I'll leave my Calendly here in case it's helpful down the line: calendly.com/macguttenberg/30min

Wishing you the best with {biz}.

— Mac`
  },
  {
    id: 'call-confirm',
    name: 'Call booked — confirmation',
    channel: 'Email',
    subject: 'Looking forward to our call',
    body: `Hi {firstName},

Thanks for booking — looking forward to chatting about {biz}.

Before our call it'd help if you could send over:
1. Your website / Etsy / IG link (whatever I should look at)
2. The one or two things that feel most broken right now
3. What "fixing it" would unlock for you

No prep needed beyond that. See you then.

— Mac`
  },
  {
    id: 'no-show',
    name: 'Call no-show — soft re-engage',
    channel: 'Email',
    subject: 'Missed you — want to reschedule?',
    body: `Hey {firstName},

No worries about missing our call earlier — life happens. Want to grab a new time?

calendly.com/macguttenberg/30min

— Mac`
  },
  {
    id: 'proposal-intro',
    name: 'Proposal — intro email',
    channel: 'Email',
    subject: 'Your proposal — {biz}',
    body: `Hi {firstName},

Great talking earlier. As promised, I put together a proposal based on what we discussed. You'll find the scope, timeline, and pricing inside.

[ATTACH PROPOSAL OR LINK]

Take your time reading through it — happy to jump on another quick call if you have questions.

— Mac`
  },
  {
    id: 'thank-you',
    name: 'Thank you — closed won',
    channel: 'Email',
    subject: 'Welcome aboard 🎉',
    body: `{firstName},

Officially excited to be working with {biz}. Onboarding link is below — fill that out when you get a moment and I'll have everything I need to kick off.

[ONBOARDING LINK]

Talk soon,
Mac`
  }
];

let leads = [];
let currentLead = null;
let currentTemplate = TEMPLATES[0];

const $ = id => document.getElementById(id);

const toast = (msg, isError) => {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.className = 'toast' + (isError ? ' error' : ''), 2500);
};

const firstName = (name) => (name || '').split(' ')[0] || '';

function fill(text) {
  if (!currentLead) return text;
  const vars = {
    '{name}': currentLead.name || '',
    '{firstName}': firstName(currentLead.name),
    '{business}': currentLead.business || currentLead.name,
    '{biz}': currentLead.business || currentLead.name,
    '{customAngle}': customAngle(currentLead),
  };
  return text.replace(/\{(name|firstName|business|biz|customAngle)\}/g, m => vars[m] || m);
}

function customAngle(lead) {
  const notes = lead.notes || '';
  const m = notes.match(/[A-Z][^.!?]*(custom|handmade|hand[- ]embroidered|personalized|laser|engraved|wedding|baby|charm|jewelry|bow|sticker)[^.!?]*[.!?]/);
  if (m) return m[0].trim();
  return `Real volume on ${lead.business || 'your shop'} — clearly something working.`;
}

function renderTemplateOptions() {
  $('template').innerHTML = TEMPLATES.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
}

function renderLeadOptions() {
  if (!leads.length) {
    $('lead').innerHTML = '<option value="">No leads yet — add some in Lead Tracker</option>';
    return;
  }
  const order = ['Contacted','New Lead','Call Booked','Proposal Sent','Won','Lost'];
  const sorted = [...leads].sort((a,b) => (order.indexOf(a.stage) - order.indexOf(b.stage)) || a.name.localeCompare(b.name));
  $('lead').innerHTML =
    '<option value="">— Generic (no lead) —</option>' +
    sorted.map(l => `<option value="${l.id}">${escapeHtml(l.name)}${l.business ? ' · ' + escapeHtml(l.business.split(' — ')[0]) : ''} · ${escapeHtml(l.stage)}</option>`).join('');
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderPreview() {
  $('t-name').textContent = currentTemplate.name;
  $('t-channel').textContent = currentTemplate.channel;
  $('t-subject').textContent = fill(currentTemplate.subject);
  $('t-body').textContent = fill(currentTemplate.body);
  highlightUnfilled('t-subject');
  highlightUnfilled('t-body');
  $('markBtn').style.display = currentLead ? 'inline-flex' : 'none';
}

function highlightUnfilled(id) {
  const el = $(id);
  el.innerHTML = el.textContent.replace(/\{[a-zA-Z]+\}/g, m => `<span class="var-empty">${m}</span>`);
}

function copyMsg() {
  const subject = $('t-subject').textContent;
  const body = $('t-body').textContent;
  const full = currentTemplate.channel === 'Email' || currentTemplate.channel === 'Email or DM'
    ? `Subject: ${subject}\n\n${body}`
    : body;
  navigator.clipboard.writeText(full).then(() => toast('Copied to clipboard.'));
}

function openEmail() {
  if (!currentLead || !currentLead.email) {
    toast('No email on this lead. Try Copy instead.', true);
    return;
  }
  const subject = encodeURIComponent($('t-subject').textContent);
  const body = encodeURIComponent($('t-body').textContent);
  window.location.href = `mailto:${currentLead.email}?subject=${subject}&body=${body}`;
}

async function markContacted() {
  if (!currentLead) return;
  try {
    const todayISO = new Date().toISOString().slice(0, 10);
    const updates = { lastContact: todayISO };
    // Only bump stage if it's still "New Lead"
    if (currentLead.stage === 'New Lead') updates.stage = 'Contacted';

    const r = await fetch('/api/leads/' + currentLead.id, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(updates)
    });
    if (!r.ok) throw new Error(await r.text());
    Object.assign(currentLead, updates);
    const lead = leads.find(l => l.id === currentLead.id);
    if (lead) Object.assign(lead, updates);
    renderLeadOptions();
    $('lead').value = currentLead.id;
    renderPreview();
    toast('Marked contacted ✓ Last Contact = today');
  } catch (e) {
    toast('Update failed: ' + e.message, true);
  }
}

$('lead').addEventListener('change', e => {
  currentLead = leads.find(l => l.id === e.target.value) || null;
  renderPreview();
});

$('template').addEventListener('change', e => {
  currentTemplate = TEMPLATES.find(t => t.id === e.target.value) || TEMPLATES[0];
  renderPreview();
});

async function init() {
  renderTemplateOptions();
  try {
    const r = await fetch('/api/leads');
    if (!r.ok) throw new Error(r.status);
    leads = await r.json();
    leads.sort((a,b) => new Date(b.created) - new Date(a.created));
  } catch (e) {
    toast('Could not load leads: ' + e.message, true);
  }
  renderLeadOptions();
  renderPreview();
}
init();
</script>
</body>
</html>
