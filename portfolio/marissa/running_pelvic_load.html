
<style>
@keyframes forceWave {
  0%   { transform: translateY(0px); }
  15%  { transform: translateY(var(--impact)); }
  40%  { transform: translateY(0px); }
  100% { transform: translateY(0px); }
}
@keyframes legStride {
  0%,100% { transform: rotate(0deg); }
  25%      { transform: rotate(12deg); }
  75%      { transform: rotate(-8deg); }
}
@keyframes floorPulse {
  0%,100% { opacity: 0.18; }
  15%      { opacity: var(--fpeak); }
  40%      { opacity: 0.18; }
}
.impact-body { animation: forceWave var(--speed,1.2s) ease-in-out infinite; }
.floor-fill  { animation: floorPulse var(--speed,1.2s) ease-in-out infinite; }
.paused * { animation-play-state: paused !important; }
</style>

<div style="padding:4px 0 0;">

<svg id="runSvg" width="100%" viewBox="0 0 680 300" role="img" style="--impact:-6px;--fpeak:0.28;--speed:2.4s;">
  <title>Ground reaction force through the pelvic floor at different activity levels</title>
  <desc>Animated figure whose body bounces with each footstrike, with a pelvic floor region that changes color intensity based on the impact load slider below.</desc>
  <defs>
    <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Ground -->
  <line x1="60" y1="272" x2="400" y2="272" stroke="var(--b)" stroke-width="0.5"/>

  <!-- ── FIGURE (bounces) ── -->
  <g class="impact-body" transform-origin="230 272">

    <!-- legs -->
    <line x1="230" y1="220" x2="200" y2="270" stroke="var(--p)" stroke-width="4" stroke-linecap="round"/>
    <line x1="230" y1="220" x2="258" y2="268" stroke="var(--p)" stroke-width="4" stroke-linecap="round"/>
    <!-- foot contact dot -->
    <circle cx="200" cy="271" r="4" fill="var(--p)" opacity="0.5"/>

    <!-- pelvis + pelvic floor zone -->
    <ellipse cx="230" cy="215" rx="28" ry="14" fill="none" stroke="var(--p)" stroke-width="1.5" opacity="0.4"/>
    <ellipse class="floor-fill" cx="230" cy="222" rx="22" ry="7" fill="#C4803A" style="--fpeak:0.28;"/>

    <!-- torso -->
    <line x1="230" y1="200" x2="230" y2="155" stroke="var(--p)" stroke-width="5" stroke-linecap="round"/>

    <!-- arms -->
    <line x1="230" y1="170" x2="205" y2="195" stroke="var(--p)" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="230" y1="170" x2="255" y2="190" stroke="var(--p)" stroke-width="3.5" stroke-linecap="round"/>

    <!-- head -->
    <circle cx="230" cy="142" r="16" fill="none" stroke="var(--p)" stroke-width="2"/>

  </g>

  <!-- ── FORCE ARROW (from foot upward) ── -->
  <line x1="200" y1="268" x2="200" y2="230" stroke="#C4803A" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr2)" opacity="0.5"/>

  <!-- ── LABEL: pelvic floor ── -->
  <line x1="258" y1="222" x2="310" y2="222" stroke="var(--b)" stroke-width="0.5" stroke-dasharray="3 2"/>
  <text x="316" y="218" font-size="12" fill="var(--p)" font-family="var(--font-sans)" font-weight="500">Pelvic floor</text>
  <text x="316" y="232" font-size="11" fill="var(--t)" font-family="var(--font-sans)">absorbs each strike</text>

  <!-- ── STATUS CARD ── -->
  <rect id="statusCard" x="430" y="100" width="210" height="80" rx="10" fill="#EAF3DE" stroke="rgba(90,143,96,0.3)" stroke-width="0.5"/>
  <text id="statusTitle" x="535" y="128" text-anchor="middle" font-size="13" font-weight="500" fill="#27500A" font-family="var(--font-sans)">Walking</text>
  <text id="statusLine1" x="535" y="148" text-anchor="middle" font-size="11" fill="#3B6D11" font-family="var(--font-sans)">Low load — pelvic floor</text>
  <text id="statusLine2" x="535" y="163" text-anchor="middle" font-size="11" fill="#3B6D11" font-family="var(--font-sans)">manages easily</text>

  <!-- ── LOAD SCALE ── -->
  <text x="430" y="218" font-size="11" fill="var(--t)" font-family="var(--font-sans)">Load</text>
  <rect x="430" y="225" width="210" height="6" rx="3" fill="var(--bg2)" stroke="var(--b)" stroke-width="0.5"/>
  <rect id="loadBar" x="430" y="225" width="52" height="6" rx="3" fill="#5A8F60"/>
  <text id="loadPct" x="535" y="248" text-anchor="middle" font-size="11" fill="var(--t)" font-family="var(--font-sans)">25%</text>
</svg>

<!-- Slider -->
<div style="display:flex;align-items:center;gap:12px;margin:8px 24px 4px;font-size:13px;color:var(--color-text-secondary);">
  <span style="font-size:11px;min-width:48px;">Walking</span>
  <input type="range" id="loadSlider" min="1" max="4" value="1" step="1" style="flex:1;" oninput="updateLoad(this.value)">
  <span style="font-size:11px;min-width:48px;text-align:right;">Jumping</span>
</div>

<script>
const levels = [
  { label:'Walking',  l1:'Low load — pelvic floor', l2:'manages easily',             pct:25,  impact:'-4px',  speed:'2.4s', fpeak:'0.22', color:'#5A8F60', bg:'#EAF3DE', border:'rgba(90,143,96,0.3)',  tc:'#27500A', sc:'#3B6D11' },
  { label:'Jogging',  l1:'Moderate load — healthy', l2:'floor absorbs & rebounds',   pct:50,  impact:'-8px',  speed:'1.4s', fpeak:'0.38', color:'#BA7517', bg:'#FAEEDA', border:'rgba(186,117,23,0.3)', tc:'#412402', sc:'#854F0B' },
  { label:'Running',  l1:'High load — floor needs', l2:'strength + good timing',     pct:75,  impact:'-13px', speed:'1s',   fpeak:'0.55', color:'#C4803A', bg:'#FDF0E4', border:'rgba(196,128,58,0.3)', tc:'#633806', sc:'#854F0B' },
  { label:'Jumping',  l1:'Very high load — symptoms', l2:'may appear without support',pct:100, impact:'-18px', speed:'0.7s', fpeak:'0.75', color:'#E24B4A', bg:'#FCEBEB', border:'rgba(226,75,74,0.3)', tc:'#501313', sc:'#A32D2D' },
];

function updateLoad(v) {
  const d = levels[v-1];
  const svg = document.getElementById('runSvg');
  svg.style.setProperty('--impact', d.impact);
  svg.style.setProperty('--speed', d.speed);

  document.querySelector('.floor-fill').style.setProperty('--fpeak', d.fpeak);
  document.querySelector('.floor-fill').setAttribute('fill', d.color);

  const card = document.getElementById('statusCard');
  card.setAttribute('fill', d.bg);
  card.setAttribute('stroke', d.border);

  document.getElementById('statusTitle').textContent = d.label;
  document.getElementById('statusTitle').setAttribute('fill', d.tc);
  document.getElementById('statusLine1').textContent = d.l1;
  document.getElementById('statusLine1').setAttribute('fill', d.sc);
  document.getElementById('statusLine2').textContent = d.l2;
  document.getElementById('statusLine2').setAttribute('fill', d.sc);

  document.getElementById('loadBar').setAttribute('width', Math.round(d.pct * 210 / 100));
  document.getElementById('loadBar').setAttribute('fill', d.color);
  document.getElementById('loadPct').textContent = d.pct + '%';
}

let rPlaying = true;
function toggleRun() {
  rPlaying = !rPlaying;
  document.getElementById('runSvg').classList.toggle('paused', !rPlaying);
  document.getElementById('rPlayLabel').textContent = rPlaying ? 'Pause' : 'Play';
}
</script>

<div style="display:flex;justify-content:center;margin:6px 0 2px;">
  <button onclick="toggleRun()" style="font-size:13px;color:var(--color-text-secondary);background:none;border:0.5px solid var(--color-border-secondary);border-radius:20px;padding:6px 18px;cursor:pointer;display:flex;align-items:center;gap:6px;">
    <span id="rPlayLabel">Pause</span>
  </button>
</div>

</div>
