
<style>
@keyframes healthyContract {
  0%   { d: path("M30,50 Q90,65 150,68 Q210,65 270,50"); }
  30%  { d: path("M30,38 Q90,50 150,52 Q210,50 270,38"); }
  60%  { d: path("M30,50 Q90,65 150,68 Q210,65 270,50"); }
  100% { d: path("M30,50 Q90,65 150,68 Q210,65 270,50"); }
}
@keyframes stuckContract {
  0%   { d: path("M30,50 Q90,65 150,68 Q210,65 270,50"); }
  25%  { d: path("M30,36 Q90,48 150,50 Q210,48 270,36"); }
  100% { d: path("M30,36 Q90,48 150,50 Q210,48 270,36"); }
}
@keyframes healthyFill {
  0%,60%,100% { fill: #5A8F60; opacity: 0.18; }
  30%          { fill: #5A8F60; opacity: 0.35; }
}
@keyframes stuckFill {
  0%   { fill: #5A8F60; opacity: 0.18; }
  25%  { fill: #C4803A; opacity: 0.35; }
  100% { fill: #C4803A; opacity: 0.35; }
}
@keyframes healthyLabel {
  0%,55%,100% { opacity: 0.4; }
  25%          { opacity: 1; }
}
@keyframes stuckLabel {
  0%   { opacity: 0.4; }
  25%  { opacity: 1; }
  100% { opacity: 1; }
}
.hc-floor { animation: healthyContract 3s ease-in-out infinite; }
.hc-fill  { animation: healthyFill 3s ease-in-out infinite; }
.sc-floor { animation: stuckContract 3s ease-in-out forwards; }
.sc-fill  { animation: stuckFill 3s ease-in-out forwards; }
.hl { animation: healthyLabel 3s ease-in-out infinite; }
.sl { animation: stuckLabel 3s ease-in-out forwards; }
.paused * { animation-play-state: paused !important; }
</style>

<svg width="100%" viewBox="0 0 680 340" role="img" id="kegelSvg">
  <title>Contract vs. release: healthy cycle vs. stuck pelvic floor</title>
  <desc>Two side-by-side pelvic floor diagrams. Left shows a healthy contract-and-release cycle that returns to baseline. Right shows a stuck pelvic floor that contracts and never fully releases, shifting from green to amber.</desc>

  <line x1="340" y1="20" x2="340" y2="290" stroke="var(--b)" stroke-width="0.5" stroke-dasharray="4 3"/>

  <!-- ── LEFT: HEALTHY ── -->
  <text x="170" y="28" text-anchor="middle" font-size="13" font-weight="500" fill="var(--p)" font-family="var(--font-sans)">Healthy cycle</text>

  <g transform="translate(50,50)">
    <rect x="0" y="0" width="270" height="120" rx="12" fill="var(--bg2)" stroke="var(--b)" stroke-width="0.5"/>

    <path class="hc-fill" d="M30,50 Q90,80 150,84 Q210,80 270,50 L270,120 L30,120 Z" stroke="none"/>
    <path class="hc-floor" fill="none" stroke="#5A8F60" stroke-width="3" stroke-linecap="round"/>

    <line x1="30" y1="50" x2="270" y2="50" stroke="var(--b)" stroke-width="0.5" stroke-dasharray="3 3"/>
    <text x="18" y="54" font-size="11" fill="var(--t)" text-anchor="end" font-family="var(--font-sans)">rest</text>
    <text x="18" y="40" font-size="11" fill="var(--t)" text-anchor="end" font-family="var(--font-sans)">up</text>
  </g>

  <g transform="translate(50,50)">
    <text class="hl" x="135" y="160" text-anchor="middle" font-size="12" fill="#5A8F60" font-family="var(--font-sans)" font-weight="500">contract → release → rest</text>
  </g>

  <g transform="translate(50,210)">
    <rect x="0" y="0" width="270" height="72" rx="8" fill="#EAF3DE" stroke="rgba(90,143,96,0.3)" stroke-width="0.5"/>
    <text x="135" y="22" text-anchor="middle" font-size="12" fill="#27500A" font-family="var(--font-sans)" font-weight="500">What this feels like</text>
    <text x="135" y="40" text-anchor="middle" font-size="11" fill="#3B6D11" font-family="var(--font-sans)">Squeeze, hold briefly,</text>
    <text x="135" y="56" text-anchor="middle" font-size="11" fill="#3B6D11" font-family="var(--font-sans)">then fully soften + let go</text>
  </g>

  <!-- ── RIGHT: STUCK ── -->
  <text x="510" y="28" text-anchor="middle" font-size="13" font-weight="500" fill="var(--p)" font-family="var(--font-sans)">Stuck / hypertonic</text>

  <g transform="translate(380,50)">
    <rect x="0" y="0" width="270" height="120" rx="12" fill="var(--bg2)" stroke="var(--b)" stroke-width="0.5"/>

    <path class="sc-fill" d="M30,50 Q90,80 150,84 Q210,80 270,50 L270,120 L30,120 Z" stroke="none"/>
    <path class="sc-floor" fill="none" stroke="#C4803A" stroke-width="3" stroke-linecap="round"/>

    <line x1="30" y1="50" x2="270" y2="50" stroke="var(--b)" stroke-width="0.5" stroke-dasharray="3 3"/>
    <text x="18" y="54" font-size="11" fill="var(--t)" text-anchor="end" font-family="var(--font-sans)">rest</text>
    <text x="18" y="40" font-size="11" fill="var(--t)" text-anchor="end" font-family="var(--font-sans)">up</text>
  </g>

  <g transform="translate(380,50)">
    <text class="sl" x="135" y="160" text-anchor="middle" font-size="12" fill="#C4803A" font-family="var(--font-sans)" font-weight="500">contract → stays contracted</text>
  </g>

  <g transform="translate(380,210)">
    <rect x="0" y="0" width="270" height="72" rx="8" fill="#FDF0E4" stroke="rgba(196,128,58,0.3)" stroke-width="0.5"/>
    <text x="135" y="22" text-anchor="middle" font-size="12" fill="#633806" font-family="var(--font-sans)" font-weight="500">What this leads to</text>
    <text x="135" y="40" text-anchor="middle" font-size="11" fill="#854F0B" font-family="var(--font-sans)">Pain, urgency, tension —</text>
    <text x="135" y="56" text-anchor="middle" font-size="11" fill="#854F0B" font-family="var(--font-sans)">the floor can't let go</text>
  </g>

  <text x="340" y="310" text-anchor="middle" font-size="11" fill="var(--t)" opacity="0.5" font-family="var(--font-sans)">More kegels on a stuck floor = more tension, not less</text>
</svg>

<div style="display:flex;justify-content:center;margin:10px 0 0;">
  <button onclick="toggleKegel()" style="font-size:13px;color:var(--color-text-secondary);background:none;border:0.5px solid var(--color-border-secondary);border-radius:20px;padding:6px 18px;cursor:pointer;display:flex;align-items:center;gap:6px;">
    <svg id="kPlayIcon" width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><rect x="2" y="1" width="3" height="10" rx="1"/><rect x="7" y="1" width="3" height="10" rx="1"/></svg>
    <span id="kPlayLabel">Pause</span>
  </button>
</div>
<script>
let kPlaying = true;
function toggleKegel() {
  kPlaying = !kPlaying;
  document.getElementById('kegelSvg').classList.toggle('paused', !kPlaying);
  document.getElementById('kPlayLabel').textContent = kPlaying ? 'Pause' : 'Play';
  document.getElementById('kPlayIcon').innerHTML = kPlaying
    ? '<rect x="2" y="1" width="3" height="10" rx="1"/><rect x="7" y="1" width="3" height="10" rx="1"/>'
    : '<path d="M2 1L11 6L2 11Z"/>';
}
</script>
