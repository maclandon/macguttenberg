<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --blue:#2563EB; --blue-light:#EFF6FF; --blue-mid:#BFDBFE; --bg:#F8FAFC; --surface:#fff; --border:#E2E8F0; --text:#0F172A; --muted:#64748B; --green:#10B981; --yellow:#F59E0B; --red:#EF4444; --radius:10px; --shadow:0 1px 3px rgba(15,23,42,.06); --shadow-md:0 4px 16px rgba(15,23,42,.10); }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); font-size:14px; }
  header { background:var(--surface); border-bottom:1px solid var(--border); padding:0 32px; height:54px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  .logo { font-family:'DM Mono',monospace; font-size:12px; font-weight:500; color:var(--blue); letter-spacing:.08em; text-transform:uppercase; }
  .date-pill { font-size:12px; color:var(--muted); font-family:'DM Mono',monospace; }
  main { max-width:1180px; margin:0 auto; padding:24px 28px 80px; }
  .tabs { display:flex; margin-bottom:24px; border-bottom:1px solid var(--border); }
  .tab { padding:10px 22px; font-size:13px; font-weight:500; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; transition:all .15s; background:none; border-top:none; border-left:none; border-right:none; font-family:'DM Sans',sans-serif; }
  .tab:hover { color:var(--text); }
  .tab.active { color:var(--blue); border-bottom-color:var(--blue); }
  .tab-content { display:none; }
  .tab-content.active { display:block; animation:fadeIn .18s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }
  .card-header { padding:14px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .card-title { font-size:11px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); }
  .daily-grid { display:grid; grid-template-columns:1fr 300px; gap:20px; }
  .focus-block { background:var(--blue); color:white; border-radius:var(--radius); padding:26px 28px; margin-bottom:18px; }
  .focus-label { font-size:10px; font-family:'DM Mono',monospace; letter-spacing:.12em; text-transform:uppercase; opacity:.65; margin-bottom:6px; }
  .focus-date { font-size:30px; font-weight:300; line-height:1; margin-bottom:3px; }
  .focus-day { font-size:13px; opacity:.75; }
  .progress-bar { height:3px; background:rgba(255,255,255,.25); border-radius:2px; overflow:hidden; margin-top:18px; }
  .progress-fill { height:100%; background:white; border-radius:2px; transition:width .5s cubic-bezier(.4,0,.2,1); }
  .stats-2col { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
  .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; text-align:center; }
  .stat-num { font-size:22px; font-weight:600; color:var(--blue); font-family:'DM Mono',monospace; }
  .stat-label { font-size:10px; color:var(--muted); margin-top:2px; text-transform:uppercase; letter-spacing:.04em; }
  .task-list { list-style:none; }
  .task-item { display:flex; align-items:center; gap:11px; padding:11px 20px; border-bottom:1px solid var(--border); transition:background .1s; cursor:pointer; }
  .task-item:last-child { border-bottom:none; }
  .task-item:hover { background:var(--bg); }
  .task-item.done .task-name { text-decoration:line-through; color:var(--muted); }
  .task-check { width:17px; height:17px; border:1.5px solid var(--border); border-radius:5px; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all .15s; background:white; }
  .task-item:hover .task-check { border-color:var(--blue); }
  .task-check.checked { background:var(--blue); border-color:var(--blue); }
  .task-check.checked::after { content:''; width:9px; height:5px; border-left:2px solid white; border-bottom:2px solid white; transform:rotate(-45deg) translateY(-1px); display:block; }
  .task-name { flex:1; font-size:13.5px; line-height:1.4; }
  .task-time { font-size:11px; font-family:'DM Mono',monospace; color:var(--muted); white-space:nowrap; }
  .priority-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .p-HIGH { background:var(--red); } .p-MED { background:var(--yellow); } .p-LOW { background:var(--green); }
  .week-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:10px; }
  .day-col { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; min-height:180px; }
  .day-col.today { border-color:var(--blue); box-shadow:0 0 0 3px var(--blue-light); }
  .day-header { padding:9px 11px; border-bottom:1px solid var(--border); font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); }
  .day-col.today .day-header { background:var(--blue); color:white; border-bottom-color:var(--blue); }
  .day-tasks { padding:6px; }
  .day-chip { padding:5px 7px; border-radius:5px; font-size:11px; margin-bottom:4px; cursor:pointer; line-height:1.35; transition:opacity .15s; border-left:2px solid; }
  .day-chip:hover { opacity:.75; }
  .day-chip.done { opacity:.38; text-decoration:line-through; }
  .day-chip.p-HIGH { background:#FEF2F2; color:#DC2626; border-left-color:#DC2626; }
  .day-chip.p-MED  { background:#FFFBEB; color:#D97706; border-left-color:#D97706; }
  .day-chip.p-LOW  { background:#ECFDF5; color:#059669; border-left-color:#059669; }
  .kanban-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
  .kanban-hdr { padding:0 0 10px; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); display:flex; align-items:center; gap:8px; }
  .kanban-count { background:var(--border); color:var(--muted); font-size:10px; font-family:'DM Mono',monospace; padding:2px 7px; border-radius:10px; }
  .kanban-cards { display:flex; flex-direction:column; gap:8px; }
  .kanban-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:12px 14px; box-shadow:var(--shadow); cursor:pointer; transition:box-shadow .15s,transform .1s; }
  .kanban-card:hover { box-shadow:var(--shadow-md); transform:translateY(-1px); }
  .kanban-card-name { font-size:13px; font-weight:500; margin-bottom:7px; line-height:1.4; }
  .kanban-meta { display:flex; gap:5px; flex-wrap:wrap; align-items:center; }
  .tag { font-size:10px; padding:2px 7px; border-radius:4px; font-weight:500; }
  .tag-blue { background:var(--blue-light); color:var(--blue); }
  .tag-red { background:#FEF2F2; color:#DC2626; } .tag-yellow { background:#FFFBEB; color:#D97706; } .tag-green { background:#ECFDF5; color:#059669; }
  .monthly-layout { display:grid; grid-template-columns:1fr 270px; gap:20px; }
  .goal-item { display:flex; align-items:flex-start; gap:12px; padding:13px 20px; border-bottom:1px solid var(--border); transition:background .1s; cursor:pointer; }
  .goal-item:last-child { border-bottom:none; }
  .goal-item:hover { background:var(--bg); }
  .goal-item.done .goal-name { text-decoration:line-through; color:var(--muted); }
  .goal-name { font-size:13.5px; font-weight:500; margin-bottom:4px; line-height:1.4; }
  .goal-due { font-size:11px; color:var(--muted); font-family:'DM Mono',monospace; }
  .sidebar-widget { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; margin-bottom:14px; }
  .notes-area { width:100%; border:none; outline:none; font-family:'DM Sans',sans-serif; font-size:13px; color:var(--text); padding:14px 16px; resize:none; min-height:130px; background:transparent; line-height:1.65; }
  .status-bar { position:fixed; bottom:0; left:0; right:0; padding:8px 32px; background:var(--surface); border-top:1px solid var(--border); font-size:11px; color:var(--muted); font-family:'DM Mono',monospace; z-index:50; }
</style>
</head>
<body>
<header>
  <div class="logo">Planner</div>
  <div class="date-pill" id="hdate"></div>
</header>
<main>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('daily')">Today</button>
    <button class="tab" onclick="switchTab('weekly')">Week</button>
    <button class="tab" onclick="switchTab('kanban')">Board</button>
    <button class="tab" onclick="switchTab('monthly')">Goals</button>
  </div>

  <div class="tab-content active" id="tab-daily">
    <div class="daily-grid">
      <div>
        <div class="focus-block">
          <div class="focus-label">Today</div>
          <div class="focus-date" id="fdate"></div>
          <div class="focus-day" id="fday"></div>
          <div class="progress-bar"><div class="progress-fill" id="dprog" style="width:0%"></div></div>
        </div>
        <div class="card">
          <div class="card-header"><span class="card-title">Today's Tasks</span></div>
          <ul class="task-list" id="today-list"></ul>
        </div>
      </div>
      <div>
        <div class="stats-2col">
          <div class="stat-card"><div class="stat-num" id="s-done">0</div><div class="stat-label">Done</div></div>
          <div class="stat-card"><div class="stat-num" id="s-total">0</div><div class="stat-label">Today</div></div>
        </div>
        <div class="sidebar-widget">
          <div class="card-header"><span class="card-title">Quick Notes</span></div>
          <textarea class="notes-area" id="notes" placeholder="jot something down..." onblur="localStorage.setItem('notes',this.value)"></textarea>
        </div>
        <div class="sidebar-widget">
          <div class="card-header"><span class="card-title">High Priority</span></div>
          <ul class="task-list" id="hp-list"></ul>
        </div>
      </div>
    </div>
  </div>

  <div class="tab-content" id="tab-weekly">
    <div class="week-grid" id="week-grid"></div>
  </div>

  <div class="tab-content" id="tab-kanban">
    <div class="kanban-grid">
      <div><div class="kanban-hdr">To Do <span class="kanban-count" id="kn-todo">0</span></div><div class="kanban-cards" id="k-todo"></div></div>
      <div><div class="kanban-hdr">In Progress <span class="kanban-count" id="kn-prog">0</span></div><div class="kanban-cards" id="k-prog"></div></div>
      <div><div class="kanban-hdr">Done <span class="kanban-count" id="kn-done">0</span></div><div class="kanban-cards" id="k-done"></div></div>
    </div>
  </div>

  <div class="tab-content" id="tab-monthly">
    <div class="monthly-layout">
      <div>
        <div class="card">
          <div class="card-header"><span class="card-title">Monthly Goals</span><span style="font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;" id="gprog">0/0</span></div>
          <ul class="task-list" id="goals-list"></ul>
        </div>
      </div>
      <div>
        <div class="sidebar-widget">
          <div class="card-header"><span class="card-title">By Category</span></div>
          <div id="cat-bd" style="padding:12px 16px;"></div>
        </div>
      </div>
    </div>
  </div>
</main>
<div class="status-bar" id="sbar">Loading...</div>

<script>
const TASKS = [{"task": "Review Upwork proposals", "day": "Monday", "priority": "HIGH", "time": "9:00 AM", "notes": "Check responses", "done": "false"}, {"task": "Cold outreach emails", "day": "Monday", "priority": "HIGH", "time": "11:00 AM", "notes": "LIC businesses", "done": "false"}, {"task": "Work on maclandon.com", "day": "Tuesday", "priority": "MED", "time": "2:00 PM", "notes": "Hero section update", "done": "false"}, {"task": "Walk Posie", "day": "Tuesday", "priority": "MED", "time": "7:00 AM", "notes": "", "done": "false"}, {"task": "Follow up with Laura", "day": "Wednesday", "priority": "HIGH", "time": "10:00 AM", "notes": "Little Learning Co.", "done": "false"}, {"task": "Birthchart track work", "day": "Wednesday", "priority": "LOW", "time": "Evening", "notes": "House 5 or 6", "done": "false"}, {"task": "Targetron prospecting", "day": "Thursday", "priority": "HIGH", "time": "1:00 PM", "notes": "New LIC leads", "done": "false"}, {"task": "Jersey City research", "day": "Thursday", "priority": "MED", "time": "4:00 PM", "notes": "100 Montgomery", "done": "false"}, {"task": "Walk Posie", "day": "Friday", "priority": "MED", "time": "7:00 AM", "notes": "", "done": "false"}, {"task": "Weekly review", "day": "Friday", "priority": "HIGH", "time": "5:00 PM", "notes": "Wins + next week plan", "done": "false"}];
const GOALS = [{"goal": "Land first paying client", "category": "Consulting", "due": "May 15", "notes": "LIC focus", "done": "false"}, {"goal": "Submit 5 Upwork proposals", "category": "Consulting", "due": "May 10", "notes": "", "done": "false"}, {"goal": "Finalize maclandon.com hero", "category": "Consulting", "due": "May 8", "notes": "", "done": "false"}, {"goal": "Build 2 speculative demo sites", "category": "Consulting", "due": "May 20", "notes": "Niforos, PJ Leahy's", "done": "false"}, {"goal": "Birthchart: finish track 5", "category": "Creative", "due": "May 31", "notes": "House 5", "done": "false"}, {"goal": "Generate 3 astrological portraits", "category": "Creative", "due": "May 25", "notes": "Gemini / LTX Studio", "done": "false"}, {"goal": "Research Jersey City apartments", "category": "Personal", "due": "May 12", "notes": "100 Montgomery", "done": "false"}, {"goal": "Walk Posie daily 21 days", "category": "Health", "due": "May 31", "notes": "Streak goal", "done": "false"}, {"goal": "FB Marketplace 3 sales", "category": "Admin", "due": "May 20", "notes": "", "done": "false"}, {"goal": "Weekly planning sessions x4", "category": "Admin", "due": "May 31", "notes": "Sunday evenings", "done": "false"}];

const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const now  = new Date();

// restore done state from localStorage
const doneT = JSON.parse(localStorage.getItem('done-tasks') || '{}');
const doneG = JSON.parse(localStorage.getItem('done-goals') || '{}');
TASKS.forEach((t,i) => t.done = doneT[i] === true);
GOALS.forEach((g,i) => g.done = doneG[i] === true);

document.getElementById('hdate').textContent = now.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
document.getElementById('fdate').textContent = now.toLocaleDateString('en-US',{month:'long',day:'numeric'});
document.getElementById('fday').textContent  = now.toLocaleDateString('en-US',{weekday:'long',year:'numeric'});
document.getElementById('notes').value = localStorage.getItem('notes') || '';

function saveDone() {
  const dt = {}, dg = {};
  TASKS.forEach((t,i) => { if(t.done) dt[i]=true; });
  GOALS.forEach((g,i) => { if(g.done) dg[i]=true; });
  localStorage.setItem('done-tasks', JSON.stringify(dt));
  localStorage.setItem('done-goals', JSON.stringify(dg));
}

function toggleTask(i) { TASKS[i].done = !TASKS[i].done; saveDone(); renderAll(); }
function toggleGoal(i) { GOALS[i].done = !GOALS[i].done; saveDone(); renderAll(); }

function makeLi(t, i) {
  const li = document.createElement('li');
  li.className = 'task-item' + (t.done?' done':'');
  li.onclick = () => toggleTask(i);
  const chk = document.createElement('div'); chk.className = 'task-check'+(t.done?' checked':'');
  const dot = document.createElement('div'); dot.className = `priority-dot p-${t.priority}`;
  const nm  = document.createElement('span'); nm.className = 'task-name'; nm.textContent = t.task;
  const tm  = document.createElement('span'); tm.className = 'task-time'; tm.textContent = t.time||'';
  li.append(chk,dot,nm,tm); return li;
}

function renderAll() {
  const today = DAYS[now.getDay()];
  const todayT = TASKS.map((t,i)=>({...t,i})).filter(t=>t.day===today);
  const doneT  = todayT.filter(t=>t.done);
  document.getElementById('s-done').textContent  = doneT.length;
  document.getElementById('s-total').textContent = todayT.length;
  const pct = todayT.length ? Math.round(doneT.length/todayT.length*100) : 0;
  document.getElementById('dprog').style.width = pct+'%';

  const tl = document.getElementById('today-list'); tl.innerHTML='';
  todayT.length ? todayT.forEach(t=>tl.appendChild(makeLi(t,t.i))) :
    tl.innerHTML='<li style="padding:16px 20px;color:var(--muted);">No tasks today</li>';

  const hp = document.getElementById('hp-list'); hp.innerHTML='';
  const highAll = TASKS.map((t,i)=>({...t,i})).filter(t=>t.priority==='HIGH'&&!t.done);
  highAll.length ? highAll.slice(0,5).forEach(t=>hp.appendChild(makeLi(t,t.i))) :
    hp.innerHTML='<li style="padding:12px 20px;color:var(--muted);">All clear</li>';

  // weekly
  const wg = document.getElementById('week-grid'); wg.innerHTML='';
  ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'].forEach(day=>{
    const col = document.createElement('div'); col.className='day-col'+(day===today?' today':'');
    const hdr = document.createElement('div'); hdr.className='day-header'; hdr.textContent=day.slice(0,3).toUpperCase();
    col.appendChild(hdr);
    const inner = document.createElement('div'); inner.className='day-tasks';
    TASKS.map((t,i)=>({...t,i})).filter(t=>t.day===day).forEach(t=>{
      const chip=document.createElement('div');
      chip.className=`day-chip p-${t.priority}`+(t.done?' done':'');
      chip.textContent=t.task; chip.onclick=()=>toggleTask(t.i);
      inner.appendChild(chip);
    });
    col.appendChild(inner); wg.appendChild(col);
  });

  // kanban
  const pc = {HIGH:'tag-red',MED:'tag-yellow',LOW:'tag-green'};
  const todo = TASKS.map((t,i)=>({...t,i})).filter(t=>!t.done&&t.priority!=='HIGH');
  const prog = TASKS.map((t,i)=>({...t,i})).filter(t=>!t.done&&t.priority==='HIGH');
  const done = TASKS.map((t,i)=>({...t,i})).filter(t=>t.done);
  [['todo',todo],['prog',prog],['done',done]].forEach(([k,arr])=>{
    document.getElementById(`kn-${k}`).textContent=arr.length;
    const el=document.getElementById(`k-${k}`); el.innerHTML='';
    arr.forEach(t=>{
      const d=document.createElement('div'); d.className='kanban-card';
      d.innerHTML=`<div class="kanban-card-name">${t.task}</div>
        <div class="kanban-meta">
          <span class="tag ${pc[t.priority]}">${t.priority}</span>
          ${t.day?`<span class="tag tag-blue">${t.day.slice(0,3)}</span>`:''}
          ${t.time?`<span style="font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;">${t.time}</span>`:''}
        </div>`;
      d.onclick=()=>toggleTask(t.i); el.appendChild(d);
    });
  });

  // monthly
  const gdone = GOALS.filter(g=>g.done).length;
  document.getElementById('gprog').textContent=`${gdone}/${GOALS.length}`;
  const gl=document.getElementById('goals-list'); gl.innerHTML='';
  GOALS.forEach((g,i)=>{
    const li=document.createElement('li'); li.className='goal-item'+(g.done?' done':'');
    li.onclick=()=>toggleGoal(i);
    const chk=document.createElement('div'); chk.className='task-check'+(g.done?' checked':''); chk.style.marginTop='2px';
    const info=document.createElement('div'); info.style.flex='1';
    info.innerHTML=`<div class="goal-name">${g.goal}</div>
      <div style="display:flex;gap:7px;align-items:center;margin-top:3px;">
        ${g.category?`<span class="tag tag-blue">${g.category}</span>`:''}
        ${g.due?`<span class="goal-due">${g.due}</span>`:''}
      </div>`;
    li.append(chk,info); gl.appendChild(li);
  });

  const cats={};
  GOALS.forEach(g=>cats[g.category]=(cats[g.category]||0)+1);
  const bd=document.getElementById('cat-bd'); bd.innerHTML='';
  Object.entries(cats).forEach(([cat,n])=>{
    const row=document.createElement('div');
    row.style.cssText='display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);';
    row.innerHTML=`<span style="font-size:13px;">${cat}</span><span style="font-size:12px;font-family:DM Mono,monospace;color:var(--blue);">${n}</span>`;
    bd.appendChild(row);
  });

  document.getElementById('sbar').textContent = `Last updated: ${now.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}`;
}

function switchTab(name) {
  ['daily','weekly','kanban','monthly'].forEach((n,i)=>{
    document.querySelectorAll('.tab')[i].classList.toggle('active',n===name);
    document.getElementById(`tab-${n}`).classList.toggle('active',n===name);
  });
}

renderAll();
</script>
</body>
</html>
