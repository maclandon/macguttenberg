<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You — Mac Landon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=1.0">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"DM Sans",sans-serif;background:#1C1A16;color:#E8E4DC;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;}
.icon{font-size:2.5rem;margin-bottom:1.5rem;}
.tag{font-size:.72rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:#7fa0c3;margin-bottom:1rem;}
h1{font-family:"Fraunces",serif;font-size:clamp(2rem,5vw,3rem);font-weight:700;line-height:1.1;margin-bottom:1rem;}
h1 em{font-style:italic;color:#7fa0c3;}
p{font-size:.95rem;color:rgba(232,228,220,.5);line-height:1.7;max-width:440px;margin-bottom:2rem;}
.btns{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;}
.btn-light{background:#E8E4DC;color:#1C1A16;padding:.8rem 1.75rem;border-radius:6px;text-decoration:none;font-size:.88rem;font-weight:500;}
.btn-outline{border:1px solid rgba(232,228,220,.2);color:rgba(232,228,220,.6);padding:.8rem 1.75rem;border-radius:6px;text-decoration:none;font-size:.88rem;}
</style>
</head>
<body>
<div class="icon">✓</div>
<div class="tag">Message received</div>
<h1>You're on my <em>radar.</em></h1>
<p>I'll be in touch within 24 hours. In the meantime, feel free to book a call directly if you'd rather not wait.</p>
<div class="btns">
  <a href="https://calendly.com/maclandon/30min" target="_blank" class="btn-light">Book a call now →</a>
  <a href="/" class="btn-outline">Back to home</a>
</div>
</body>
</html>
